<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guild Loot Prices – Throne & Liberty</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dim: #7a6030;
    --bg-dark: #0d0e10;
    --bg-card: #13151a;
    --bg-card2: #1a1d24;
    --border: rgba(201,168,76,0.22);
    --border-bright: rgba(201,168,76,0.55);
    --text: #e8e0d0;
    --text-dim: #7a7060;
    --green: #4caf7a;
    --green-bg: rgba(76,175,122,0.12);
    --amber: #e0a030;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--bg-dark);
    color: var(--text);
    min-height: 100vh;
    background-image: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(201,168,76,0.05) 0%, transparent 70%);
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 1.8rem;
  }

  .header-line {
    width: 100px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto 1rem;
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.4rem, 3.5vw, 2.4rem);
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.04em;
    text-shadow: 0 0 30px rgba(201,168,76,0.25);
  }

  header p {
    color: var(--text-dim);
    font-size: 0.82rem;
    margin-top: 0.4rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .last-update {
    font-size: 0.72rem;
    color: var(--gold-dim);
    margin-top: 0.3rem;
  }

  .controls {
    max-width: 1100px;
    margin: 0 auto 1.2rem;
    padding: 0 1rem;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px 9px 36px;
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-size: 0.88rem;
    outline: none;
  }

  .search-wrap input:focus { border-color: var(--gold-dim); }
  .search-wrap input::placeholder { color: var(--text-dim); }

  .si {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 13px;
  }

  .filter-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 16px;
    color: var(--text-dim);
    font-family: 'Lato', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.03em;
  }

  .filter-btn.active {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold-dim);
    color: var(--gold-light);
  }

  .filter-btn:hover {
    border-color: var(--gold-dim);
    color: var(--text);
  }

  .grid {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 1rem 3rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
  }

  .card:hover {
    border-color: var(--border-bright);
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.5);
  }

  .card.active {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px rgba(201,168,76,0.3);
  }

  .type-bar { height: 3px; width: 100%; }
  .type-archboss .type-bar { background: linear-gradient(90deg, #b03030, #d06020); }
  .type-worldboss .type-bar { background: linear-gradient(90deg, #6a5020, var(--gold)); }
  .type-guildboss .type-bar { background: linear-gradient(90deg, #1a4a60, #2a80a0); }

  .card-img-wrap {
    width: 100%;
    aspect-ratio: 1;
    background: var(--bg-card2);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .card-img-wrap img {
    width: 68%;
    height: 68%;
    object-fit: contain;
    transition: transform 0.3s;
    image-rendering: -webkit-optimize-contrast;
  }

  .card:hover .card-img-wrap img { transform: scale(1.1); }
  .img-fb { font-size: 2.5rem; opacity: 0.25; }

  .card-body { padding: 10px 12px; }

  .boss-name {
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    color: var(--gold-light);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .weapon-name {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .type-badge {
    display: inline-block;
    font-size: 0.6rem;
    padding: 2px 6px;
    border-radius: 3px;
    margin-top: 5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 700;
  }

  .type-archboss .type-badge { background: rgba(180,60,60,0.2); color: #d08080; }
  .type-worldboss .type-badge { background: rgba(201,168,76,0.12); color: var(--gold); }
  .type-guildboss .type-badge { background: rgba(42,128,160,0.15); color: #4a9ab0; }

  .price-section {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  .price-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 4px;
  }

  .price-label {
    font-size: 0.68rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .price-value {
    font-size: 0.85rem;
    font-weight: 700;
  }

  .price-hdv { color: var(--text); }
  .price-guild { color: var(--green); }

  .disc-pill {
    font-size: 0.6rem;
    background: rgba(76,175,122,0.15);
    color: var(--green);
    padding: 1px 6px;
    border-radius: 20px;
    font-weight: 700;
    margin-top: 3px;
    display: inline-block;
  }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(5px);
  }

  .overlay.open { display: flex; }

  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border-bright);
    border-radius: 14px;
    width: 100%;
    max-width: 460px;
    overflow: hidden;
    position: relative;
    animation: su 0.18s ease;
  }

  @keyframes su {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .close-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(255,255,255,0.07);
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .close-btn:hover {
    background: rgba(255,255,255,0.14);
    color: var(--text);
  }

  .modal-top {
    padding: 1.3rem;
    display: flex;
    gap: 1rem;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .modal-img {
    width: 86px;
    height: 86px;
    background: var(--bg-card2);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .modal-img img {
    width: 78%;
    height: 78%;
    object-fit: contain;
  }

  .modal-boss {
    font-family: 'Cinzel', serif;
    font-size: 1.15rem;
    color: var(--gold-light);
    font-weight: 700;
  }

  .modal-weapon {
    font-size: 0.82rem;
    color: var(--text-dim);
    margin-top: 4px;
    line-height: 1.4;
  }

  .modal-body { padding: 1.3rem; }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 1rem;
  }

  .stat {
    background: var(--bg-card2);
    border-radius: 8px;
    padding: 11px 8px;
    text-align: center;
  }

  .stat-lbl {
    font-size: 0.67rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 5px;
  }

  .stat-val {
    font-size: 1.2rem;
    font-weight: 700;
    line-height: 1;
  }

  .c-gold { color: var(--gold-light); }
  .c-green { color: var(--green); }
  .c-amber { color: var(--amber); }

  .stat-unit {
    font-size: 0.6rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .disc-box {
    background: rgba(76,175,122,0.1);
    border: 1px solid rgba(76,175,122,0.22);
    border-radius: 8px;
    padding: 11px 13px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .disc-icon {
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  .disc-strong {
    color: var(--green);
    font-size: 0.95rem;
    font-weight: 700;
  }

  .disc-sub {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .status-msg {
    grid-column: 1/-1;
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-dim);
    font-size: 0.88rem;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 0.8rem;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  footer {
    text-align: center;
    padding: 1.2rem;
    color: var(--text-dim);
    font-size: 0.72rem;
    border-top: 1px solid var(--border);
    max-width: 1100px;
    margin: 0 auto;
    letter-spacing: 0.03em;
  }

  @media (max-width: 480px) {
    .grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
  }
</style>
</head>
<body>

<header>
  <div class="header-line"></div>
  <h1>⚔ Guild Loot — Prix de guilde</h1>
  <p>Throne &amp; Liberty · Clique sur une arme pour voir le rabais</p>
  <div class="last-update" id="last-update"></div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="search" placeholder="Rechercher un boss ou une arme..." oninput="applyFilters()">
  </div>
  <button class="filter-btn active" onclick="setFilter('all',this)">Tous</button>
  <button class="filter-btn" onclick="setFilter('Archboss',this)">Archboss</button>
  <button class="filter-btn" onclick="setFilter('World Boss',this)">World Boss</button>
  <button class="filter-btn" onclick="setFilter('Guild Boss',this)">Guild Boss</button>
</div>

<div class="grid" id="grid">
  <div class="status-msg">
    <div class="spinner"></div>
    Chargement des données...
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeDetail(event)">
  <div class="modal">
    <button class="close-btn" onclick="closeOverlay()">✕</button>
    <div class="modal-top">
      <div class="modal-img"><img id="m-img" src="" alt="" onerror="this.style.display='none'"></div>
      <div>
        <div class="modal-boss" id="m-boss"></div>
        <div class="modal-weapon" id="m-weapon"></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="stats">
        <div class="stat">
          <div class="stat-lbl">Prix HDV</div>
          <div class="stat-val c-gold" id="m-hdv">—</div>
          <div class="stat-unit">lucents</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Prix guilde</div>
          <div class="stat-val c-green" id="m-guild">—</div>
          <div class="stat-unit">lucents</div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Économie</div>
          <div class="stat-val c-amber" id="m-save">—</div>
          <div class="stat-unit">lucents</div>
        </div>
      </div>
      <div class="disc-box">
        <span class="disc-icon">🏷</span>
        <div>
          <div class="disc-strong" id="m-pct"></div>
          <div class="disc-sub" id="m-rule"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>Prix mis à jour manuellement par les officiers · Données indicatives · Throne &amp; Liberty</footer>

<script>
// ══════════════════════════════════════════════════
// GOOGLE SHEET
// ══════════════════════════════════════════════════
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1tpqqR1GCI2-6e3zjF29iuVFcHKIbpvYG16nxs0VoaO8/gviz/tq?tqx=out:json&sheet=Weapons";

// ══════════════════════════════════════════════════
// CONFIG RABAIS DYNAMIQUE
// Tu peux jouer avec ces valeurs
// curve = 'linear' | 'sqrt' | 'log' | 'power'
// normalizeMode = 'linear' | 'log'
// ══════════════════════════════════════════════════
const DISCOUNT_CONFIG = {
  minPct: 4.1,
  maxPct: 30,
  curve: 'sqrt',
  normalizeMode: 'log',
  powerExponent: 1.8,
  logStrength: 9
};

let priceStats = {
  min: 0,
  max: 0
};

// Base d'images depuis cdn.tldb.info
const CDN = "https://cdn.tldb.info/db/images/ags/v41/128/image/icon/item_128/equip/weapon/";
const CDN_ARM = "https://cdn.tldb.info/db/images/ags/v41/128/image/icon/item_128/equip/armor/";
const CDN_ACC = "https://cdn.tldb.info/db/images/ags/v41/128/image/icon/item_128/equip/accessory/";

const KNOWN_IMGS = {
  "Bellandir's Hivemind Staff":       CDN + "it_p_staff_10001.png",
  "Bellandir's Wand of Attunement":   CDN + "it_p_wand_10001.png",
  "Bellandir's Arc of Wailing Death": CDN + "it_p_bow_10001.png",
  "Swirling Essence Robes":           CDN_ARM + "it_p_chest_10001.png",
  "Band of Universal Power":          CDN_ACC + "it_p_ring_10001.png",
  "Shadow Harvester Boots":           CDN_ARM + "it_p_feet_10001.png",
  "Arc of Wailing Death":             CDN + "it_p_bow_10002.png",
  "Tevent's Wailing Blade":           CDN + "it_p_sword_10002.png",
  "Tevent's Annihilating Greatsword": CDN + "it_p_sword2h_10002.png",
  "Tevent's Ashen Spellblade":        CDN + "it_p_sword_10002.png",
  "Adentus's Gargantuan Greatsword":  CDN + "it_p_sword2h_00028.png",
  "Chernobog's Blade of Beheading":   CDN + "it_p_sword_00041.png",
  "Talus's Crystalline Staff":        CDN + "it_p_staff_00022.png",
  "Kowazan's Twilight Daggers":       CDN + "it_p_dagger_00020.png",
  "Kowazan's Sunflare Crossbows":     CDN + "it_p_crossbow_00025.png",
  "Cornelius's Animated Edge":        CDN + "it_p_sword2h_00027.png",
  "Grand Aelon's Thornwood Longbow":  CDN + "it_p_bow_00024.png",
};

const WEAPON_ICONS = {
  greatsword: "⚔",
  sword: "🗡",
  dagger: "🗡",
  staff: "🔮",
  wand: "🪄",
  bow: "🏹",
  crossbow: "🏹",
  spear: "⛏",
  armor: "🛡",
  ring: "💍",
  default: "⚔"
};

const DEMO_DATA = [
  { boss:"Bellandir", type:"Archboss", weapon:"Bellandir's Hivemind Staff", price:55000 },
  { boss:"Bellandir", type:"Archboss", weapon:"Swirling Essence Robes", price:32000 },
  { boss:"Bellandir", type:"Archboss", weapon:"Band of Universal Power", price:28000 },
  { boss:"Tevent", type:"Archboss", weapon:"Arc of Wailing Death", price:60000 },
  { boss:"Tevent", type:"Archboss", weapon:"Tevent's Annihilating Greatsword", price:45000 },
  { boss:"Tevent", type:"Archboss", weapon:"Shadow Harvester Boots", price:18000 },
  { boss:"Adentus", type:"World Boss", weapon:"Adentus's Gargantuan Greatsword", price:7500 },
  { boss:"Chernobog", type:"World Boss", weapon:"Chernobog's Blade of Beheading", price:5000 },
  { boss:"Talus", type:"World Boss", weapon:"Talus's Crystalline Staff", price:4500 },
  { boss:"Kowazan", type:"World Boss", weapon:"Kowazan's Twilight Daggers", price:4000 },
  { boss:"Lycan Kowazan", type:"World Boss", weapon:"Kowazan's Sunflare Crossbows", price:4200 },
  { boss:"Grand Aelon", type:"World Boss", weapon:"Grand Aelon's Thornwood Longbow", price:5500 },
  { boss:"Cornelius", type:"World Boss", weapon:"Cornelius's Animated Edge", price:4800 },
  { boss:"Minezerok", type:"Guild Boss", weapon:"Minezerok's Great Axe", price:6200 },
  { boss:"Junobote", type:"Guild Boss", weapon:"Junobote's War Hammer", price:5800 },
  { boss:"Nirma", type:"Guild Boss", weapon:"Nirma's Spectral Dagger", price:5200 },
  { boss:"Malakar", type:"Guild Boss", weapon:"Malakar's Spine Bow", price:5600 },
  { boss:"Aridus", type:"Guild Boss", weapon:"Aridus's Desert Blade", price:5400 },
];

const typeClass = {
  "Archboss":"type-archboss",
  "World Boss":"type-worldboss",
  "Guild Boss":"type-guildboss"
};

const typeFb = {
  "Archboss":"💀",
  "World Boss":"🌍",
  "Guild Boss":"⚔"
};

let allWeapons = [];
let currentFilter = 'all';
let selectedId = null;

function fmt(n) {
  return Math.round(n).toLocaleString('fr-FR');
}

function computePriceStats(items) {
  if (!items || items.length === 0) {
    priceStats = { min: 0, max: 0 };
    return;
  }

  const prices = items
    .map(item => Number(item.price))
    .filter(price => Number.isFinite(price) && price > 0);

  if (prices.length === 0) {
    priceStats = { min: 0, max: 0 };
    return;
  }

  priceStats.min = Math.min(...prices);
  priceStats.max = Math.max(...prices);
}

function normalizePrice(price) {
  const min = priceStats.min;
  const max = priceStats.max;

  if (max <= min) return 1;

  if (DISCOUNT_CONFIG.normalizeMode === 'log') {
    const logMin = Math.log(min + 1);
    const logMax = Math.log(max + 1);
    const logPrice = Math.log(price + 1);

    return Math.min(1, Math.max(0, (logPrice - logMin) / (logMax - logMin)));
  }

  return Math.min(1, Math.max(0, (price - min) / (max - min)));
}

function applyCurve(t) {
  switch (DISCOUNT_CONFIG.curve) {
    case 'linear':
      return t;

    case 'sqrt':
      return Math.sqrt(t);

    case 'log':
      return Math.log(1 + DISCOUNT_CONFIG.logStrength * t) / Math.log(1 + DISCOUNT_CONFIG.logStrength);

    case 'power':
      return Math.pow(t, DISCOUNT_CONFIG.powerExponent);

    default:
      return Math.sqrt(t);
  }
}

function getDiscount(price) {
  const t = normalizePrice(price);
  const curved = applyCurve(t);

  const pct = DISCOUNT_CONFIG.minPct +
    (DISCOUNT_CONFIG.maxPct - DISCOUNT_CONFIG.minPct) * curved;

  return Math.round(pct);
}

function guildPrice(price) {
  return Math.round(price * (1 - getDiscount(price) / 100));
}

function getRuleLabel(price) {
  const t = normalizePrice(price);
  return `Rabais dynamique (${DISCOUNT_CONFIG.curve}/${DISCOUNT_CONFIG.normalizeMode}) · min ${fmt(priceStats.min)} ✦ · max ${fmt(priceStats.max)} ✦ · position ${Math.round(t * 100)}%`;
}

function getImg(weapon) {
  if (KNOWN_IMGS[weapon]) return KNOWN_IMGS[weapon];
  return '';
}

function buildCard(w, idx) {
  const disc = getDiscount(w.price);
  const tc = typeClass[w.type] || 'type-worldboss';
  const img = w.img || getImg(w.weapon);

  const imgHtml = img
    ? `<img src="${img}" alt="${w.weapon}" onerror="this.parentNode.innerHTML='<span class=img-fb>${typeFb[w.type]||'⚔'}</span>'">`
    : `<span class="img-fb">${typeFb[w.type]||'⚔'}</span>`;

  return `
    <div class="card ${tc}${selectedId===idx ? ' active' : ''}" onclick="openDetail(${idx})">
      <div class="type-bar"></div>
      <div class="card-img-wrap">${imgHtml}</div>
      <div class="card-body">
        <div class="boss-name">${w.boss}</div>
        <div class="weapon-name">${w.weapon}</div>
        <span class="type-badge">${w.type}</span>
        <div class="price-section">
          <div class="price-row">
            <span class="price-label">HDV</span>
            <span class="price-value price-hdv">${fmt(w.price)} ✦</span>
          </div>
          <div class="price-row">
            <span class="price-label">Guilde</span>
            <span class="price-value price-guild">${fmt(guildPrice(w.price))} ✦</span>
          </div>
          <span class="disc-pill">-${disc}% membres guilde</span>
        </div>
      </div>
    </div>
  `;
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');

  const filtered = allWeapons
    .map((w, i) => ({ w, i }))
    .filter(({ w }) => {
      const mq = !q || w.boss.toLowerCase().includes(q) || w.weapon.toLowerCase().includes(q);
      const mt = currentFilter === 'all' || w.type === currentFilter;
      return mq && mt;
    });

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="status-msg">Aucune arme trouvée.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(({ w, i }) => buildCard(w, i)).join('');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function openDetail(idx) {
  selectedId = idx;
  const w = allWeapons[idx];
  const disc = getDiscount(w.price);
  const guild = guildPrice(w.price);
  const img = w.img || getImg(w.weapon);

  document.getElementById('m-boss').textContent = w.boss;
  document.getElementById('m-weapon').textContent = w.weapon;
  document.getElementById('m-hdv').textContent = fmt(w.price);
  document.getElementById('m-guild').textContent = fmt(guild);
  document.getElementById('m-save').textContent = fmt(w.price - guild);
  document.getElementById('m-pct').textContent = `-${disc}% de rabais guilde`;
  document.getElementById('m-rule').textContent = getRuleLabel(w.price);

  const mImg = document.getElementById('m-img');
  if (img) {
    mImg.src = img;
    mImg.style.display = '';
  } else {
    mImg.style.display = 'none';
  }

  document.getElementById('overlay').classList.add('open');
  applyFilters();
}

function closeOverlay() {
  selectedId = null;
  document.getElementById('overlay').classList.remove('open');
  applyFilters();
}

function closeDetail(e) {
  if (e.target === document.getElementById('overlay')) closeOverlay();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeOverlay();
});

async function loadData() {
  if (SHEET_URL.includes('VOTRE_ID_ICI')) {
    allWeapons = DEMO_DATA;
    computePriceStats(allWeapons);
    document.getElementById('last-update').textContent =
      `⚠ Mode démonstration — min ${fmt(priceStats.min)} ✦ · max ${fmt(priceStats.max)} ✦`;
    applyFilters();
    return;
  }

  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/);

    if (!match) {
      throw new Error("Réponse Google Sheet invalide");
    }

    const json = JSON.parse(match[1]);
    const rows = json.table.rows || [];

    allWeapons = rows.map(r => ({
      boss:   r.c?.[0]?.v || '',
      type:   r.c?.[1]?.v || 'World Boss',
      weapon: r.c?.[2]?.v || '',
      price:  Number(r.c?.[3]?.v) || 0,
      img:    r.c?.[4]?.v || '',
    })).filter(w => w.boss && w.weapon && w.price > 0);

    computePriceStats(allWeapons);

    const now = new Date().toLocaleDateString('fr-FR', {
      day: 'numeric',
      month: 'long',
      year: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });

    document.getElementById('last-update').textContent =
      `Synchronisé le ${now} · Min ${fmt(priceStats.min)} ✦ · Max ${fmt(priceStats.max)} ✦`;

  } catch (e) {
    console.error(e);
    allWeapons = DEMO_DATA;
    computePriceStats(allWeapons);
    document.getElementById('last-update').textContent =
      `⚠ Erreur de connexion — Mode démonstration · min ${fmt(priceStats.min)} ✦ · max ${fmt(priceStats.max)} ✦`;
  }

  applyFilters();
}

loadData();
</script>
